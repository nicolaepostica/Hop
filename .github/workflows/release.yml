name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: deb

          - os: macos-13           # Intel runner
            target: x86_64-apple-darwin
            bundle: osx

          - os: macos-latest       # Apple Silicon runner
            target: aarch64-apple-darwin
            bundle: osx

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libx11-dev \
            libwayland-dev libxkbcommon-dev

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Build binary
        run: cargo build --release --bin hop --target ${{ matrix.target }}

      - name: Bundle (Linux / Windows)
        if: matrix.bundle != 'osx'
        working-directory: bins/hop
        run: |
          cargo bundle --release --format ${{ matrix.bundle }} \
            --target ${{ matrix.target }}

      - name: Bundle macOS app
        if: matrix.bundle == 'osx'
        working-directory: bins/hop
        run: |
          cargo bundle --release --format osx \
            --target ${{ matrix.target }}

      - name: Sign and notarize (macOS)
        if: matrix.bundle == 'osx' && secrets.APPLE_CERT_P12_BASE64 != ''
        run: ./scripts/ci/macos-sign-and-notarize.sh
        env:
          TARGET:                   ${{ matrix.target }}
          APPLE_CERT_P12_BASE64:    ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD:      ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY:   ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                 ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD:       ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID:            ${{ secrets.APPLE_TEAM_ID }}

      - name: Compute SHA256 checksums
        shell: bash
        run: |
          ARCH=$(echo "${{ matrix.target }}" | cut -d- -f1)
          if [ "${{ matrix.bundle }}" = "osx" ]; then
            # DMG was produced by the sign script or we create one unsigned
            if [ ! -f "Hop-${ARCH}.dmg" ]; then
              hdiutil create \
                -volname "Hop" \
                -srcfolder "bins/hop/target/${{ matrix.target }}/release/bundle/osx/Hop.app" \
                -ov -format UDZO "Hop-${ARCH}.dmg"
            fi
            shasum -a 256 "Hop-${ARCH}.dmg" > "Hop-${ARCH}.dmg.sha256"
          else
            BUNDLE_DIR="bins/hop/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle }}"
            for f in "$BUNDLE_DIR"/*; do
              shasum -a 256 "$f" > "${f}.sha256"
            done
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hop-${{ matrix.target }}
          retention-days: 7
          path: |
            Hop-*.dmg
            Hop-*.dmg.sha256
            bins/hop/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle }}/*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
